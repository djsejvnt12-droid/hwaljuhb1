<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강화 전략 가이드</title>
  <style>
    @font-face {
      font-family: 'MapleStory';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2.1/MapleStoryOTFBold.woff') format('woff');
    }
    body { 
      background: #2a2522; color: #ede0d4; font-family: 'MapleStory', sans-serif; 
      padding: 20px; display: flex; justify-content: center; 
    }
    .container { width: 100%; max-width: 400px; background: #1e1b1a; border: 2px solid #5c4d3d; padding: 20px; border-radius: 8px; }
    h2 { color: #d4b483; text-align: center; border-bottom: 2px solid #5c4d3d; padding-bottom: 10px; margin-top: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 15px; border: 1px solid #5c4d3d; text-align: center; }
    th { background: #4a3f36; color: #fdf6e3; }
    .highlight { color: #ffeb99; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>가성비 강화 로드맵 (누적 합계)</h2>
  <table>
    <tr>
      <th>강화 목표</th>
      <th>20부위 누적 데미지 상승</th>
    </tr>
    <tr>
      <td><span class="highlight">8강 달성</span></td>
      <td>+6억 6,000만</td>
    </tr>
    <tr>
      <td><span class="highlight">11강 달성</span></td>
      <td>+19억</td>
    </tr>
    <tr>
      <td>15강 달성</td>
      <td>+59억</td>
    </tr>
  </table>
  <p style="text-align: center; font-size: 0.85em; color: #888; margin-top: 20px;">
    ※ 20부위 전체 균등 강화 기준
  </p>
</div>

</body>
</html>
